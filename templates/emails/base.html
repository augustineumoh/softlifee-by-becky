<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soft Lifee by Becky</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#F3E8FF; font-family:'Helvetica Neue',Arial,sans-serif; color:#1A1A2E; }
    .wrapper { max-width:600px; margin:0 auto; padding:24px 16px; }
    .card { background:#FFFFFF; border-radius:12px; overflow:hidden; box-shadow:0 4px 24px rgba(138,79,177,0.08); }
    .header { background:linear-gradient(135deg,#8A4FB1,#5B21B6); padding:32px 40px; text-align:center; }
    .logo { font-size:28px; font-weight:700; color:#FFFFFF; letter-spacing:1px; }
    .logo span { font-style:italic; color:#D4AF37; }
    .tagline { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-top:6px; }
    .body { padding:40px; }
    .footer { text-align:center; padding:24px 40px; background:#FAF7FF; border-top:1px solid rgba(138,79,177,0.08); }
    .footer p { font-size:11px; color:rgba(26,26,46,0.4); line-height:1.8; }
    .footer a { color:#8A4FB1; text-decoration:none; }
    h1 { font-size:24px; font-weight:600; color:#1A1A2E; margin-bottom:12px; line-height:1.3; }
    p { font-size:14px; line-height:1.8; color:#5B21B6; margin-bottom:16px; }
    .btn { display:inline-block; background:#8A4FB1; color:#FFFFFF !important; text-decoration:none; padding:14px 32px; border-radius:8px; font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin:8px 0; }
    .divider { height:1px; background:rgba(138,79,177,0.1); margin:24px 0; }
    .order-table { width:100%; border-collapse:collapse; margin:16px 0; }
    .order-table th { text-align:left; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(26,26,46,0.4); padding:8px 0; border-bottom:1px solid rgba(138,79,177,0.12); }
    .order-table td { padding:12px 0; border-bottom:1px solid rgba(138,79,177,0.06); font-size:13px; color:#1A1A2E; vertical-align:middle; }
    .order-table td.right { text-align:right; }
    .total-row td { font-weight:700; font-size:15px; color:#8A4FB1; border-bottom:none; padding-top:16px; }
    .badge { display:inline-block; background:#F3E8FF; color:#8A4FB1; padding:4px 12px; border-radius:100px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .info-box { background:#FAF7FF; border:1px solid rgba(138,79,177,0.15); border-radius:8px; padding:16px 20px; margin:16px 0; }
    .info-box p { margin:4px 0; font-size:13px; color:#1A1A2E; }
    .info-box p strong { color:#8A4FB1; }
    .highlight { color:#8A4FB1; font-weight:600; }
    .gold { color:#D4AF37; font-weight:600; }
    .center { text-align:center; }
    .small { font-size:12px; color:rgba(26,26,46,0.4); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div class="logo">Soft<span>Lifee</span>.</div>
        <div class="tagline">Luxury Goods &middot; Lifestyle</div>
      </div>

      <!-- Body -->
      <div class="body">
        {% block content %}{% endblock %}
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>
          &copy; 2026 Soft Lifee by Becky &middot; Uyo, Akwa Ibom, Nigeria<br/>
          <a href="{{ frontend_url }}">softlifeebybecky.com</a>
          &nbsp;&middot;&nbsp;
          <a href="https://wa.me/2347019908205">Chat on WhatsApp</a>
          &nbsp;&middot;&nbsp;
          <a href="https://www.instagram.com/soft.lifeebybeckie/">Instagram</a>
        </p>
        <p style="margin-top:8px;">
          You're receiving this email because you have an account or placed an order on Soft Lifee.
        </p>
      </div>

    </div>
  </div>
</body>
</html>
